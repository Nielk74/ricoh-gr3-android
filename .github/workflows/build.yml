name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build, lint and test
        run: ./gradlew assembleDebug lint test --stacktrace

      - name: Render film-emulation previews
        run: ./gradlew :tools:renderPreviews --stacktrace

      - name: Upload film-emulation previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: film-previews
          path: docs/previews/

      - name: Upload lint and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/
