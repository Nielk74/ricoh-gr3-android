name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compute version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version_name=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "version_code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Verify source, tests, lint and previews
        run: |
          ./gradlew assembleDebug lint test :tools:renderPreviews --stacktrace
          git diff --exit-code -- docs/previews

      - name: Require release signing secrets
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_B64" || { echo "KEYSTORE_B64 is missing"; exit 1; }
          test -n "$STORE_PASSWORD" || { echo "STORE_PASSWORD is missing"; exit 1; }
          test -n "$KEY_ALIAS" || { echo "KEY_ALIAS is missing"; exit 1; }
          test -n "$KEY_PASSWORD" || { echo "KEY_PASSWORD is missing"; exit 1; }

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build signed APK and AAB
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release-keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          GITHUB_REPO: ${{ github.repository }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Verify APK signature
        run: |
          APK="$(find app/build/outputs/apk/release -name '*.apk' -type f -print -quit)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          test -n "$APK" || { echo "Release APK was not produced"; exit 1; }
          test -n "$APKSIGNER" || { echo "apksigner was not found"; exit 1; }
          "$APKSIGNER" verify --verbose --print-certs "$APK"

      - name: Generate APK checksum
        run: |
          for apk in app/build/outputs/apk/release/*.apk; do
            sha256sum "$apk" > "$apk.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.apk.sha256
            app/build/outputs/bundle/release/*.aab
